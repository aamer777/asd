<!DOCTYPE html>
<html lang="ar">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>موقعك الشخصية</title>
 <link rel="stylesheet" href="styles.css">
</head>
<body>
 <header>
 <nav>
 <ul>
 <li><a href="#home">الصفحة الرئيسية</a></li>
 <li><a href="#about">حولنا</a></li>
 <li><a href="#services">الخدمات</a></li>
 <li><a href="#contact">تصل بنا</a></li>
 </ul>
 </nav>
 </header>

 <section id="home">
 <h1>مرحبًا بكم في موقعنا!</h1>
 <p>نحن نقدم خدمات متنوعة لتلبية احتياجاتكم.</p>
 <button onclick="openPopup()">تسجيل الدخول</button>
 </section>

 <section id="about">
 <h2>حولنا</h2>
 <p>نحن فريق مطورين متحمسين لتقديم أفضل الخدمات الممكنة لعميلينا.</p>
 </section>

 <section id="services">
 <h2>الخدمات</h2>
 <ul>
 <li>خدمة 1</li>
 <li>خدمة 2</li>
 <li>خدمة 3</li>
 </ul>
 </section>

 <section id="contact">
 <h2>تصل بنا</h2>
 <form>
 <label for="name">الاسم:</label>
 <input type="text" id="name" name="name" required>
 <label for="email">البريد الإلكتروني:</label>
 <input type="email" id="email" name="email" required>
 <label for="message">الرسالة:</label>
 <textarea id="message" name="message" required></textarea>
 <button type="submit">إرسال</button>
 </form>
 </section>

 <footer>
 <p>&copy; 2023 موقعك الشخصية. جميع الحقوق محفوظة.</p>
 </footer>

 <div id="popup" class="popup">
 <div class="popup-content">
 <span class="close-button" onclick="closePopup()">&times;</span>
 <h2>تسجيل الدخول</h2>
 <form>
 <label for="login-name">الاسم:</label>
 <input type="text" id="login-name" name="login-name" required>
 <label for="login-password">كلمة المرور:</label>
 <input type="password" id="login-password" name="login-password" required>
 <button type="submit">تسجيل الدخول</button>
 </form>
 </div>
 </div>

 <script>
 function openPopup() {
 document.getElementById('popup').style.display = 'block';
 }

 function closePopup() {
 document.getElementById('popup').style.display = 'none';
 }

 window.onclick = function(event) {
 if (event.target === document.getElementById('popup')) {
 closePopup();
 }
 }
 </script>
</body>
</html>
